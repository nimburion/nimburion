version: "2"

linters:
  default: standard
  enable:
    - bidichk
    - copyloopvar
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - revive
    - rowserrcheck
    - staticcheck
    - unused

  settings:
    copyloopvar:
      check-alias: true

    errcheck:
      exclude-functions:
        - (*database/sql.Rows).Close
        - (*go.uber.org/zap.Logger).Sync
      check-type-assertions: true
      check-blank: true

    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true

    gosec:
      config:
        G101:
          pattern: "(?i)(password|passwd|secret|token|api[_-]?key|access[_-]?key|secret[_-]?key)"
          ignore_entropy: false
          entropy_threshold: "80.0"
          per_char_threshold: "3.0"
          truncate: "32"

    govet:
      enable:
        - shadow
        - nilness
        - stdversion
        - waitgroup

    misspell:
      locale: US

    nolintlint:
      require-explanation: true
      allow-unused: false

    revive:
      enable-default-rules: true
      directives:
        - name: specify-disable-reason
          severity: error
      rules:
        - name: exported
          disabled: false
          arguments:
            - "disableStutteringCheck"
        - name: package-comments
          disabled: true

    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx

    staticcheck:
      checks:
        - all
        - -SA1029 # tienilo spento solo finché stai migrando le context keys

  exclusions:
    generated: strict
    warn-unused: true
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

      - text: "G101.*test"
        linters:
          - gosec

      - path: "pkg/auth/oauth2\\.go$"
        text: "G117: Exported struct field .* matches secret pattern"
        linters:
          - gosec

      - path: "pkg/config/config\\.go$"
        text: "G117: Exported struct field .* matches secret pattern"
        linters:
          - gosec

      - path: "pkg/email/(mailchimp_provider|mailgun_provider|providers_extra|sendgrid_provider|ses_provider|smtp_provider)\\.go$"
        text: "G117: Exported struct field .* matches secret pattern"
        linters:
          - gosec

      - path: "pkg/eventbus/sqs/adapter\\.go$"
        text: "G117: Exported struct field .* matches secret pattern"
        linters:
          - gosec

      - path: "pkg/store/(dynamodb/adapter|opensearch/adapter|s3/adapter)\\.go$"
        text: "G117: Exported struct field .* matches secret pattern"
        linters:
          - gosec

      - path: "pkg/(i18n/context|jobs/contract|middleware/session/oauth_tokens)\\.go$"
        text: "G101: Potential hardcoded credentials"
        linters:
          - gosec

    paths:
      - vendor
      - testdata
      - ".*\\.pb\\.go$"

formatters:
  enable:
    - gofumpt
    - goimports

  settings:
    gofumpt:
      module-path: github.com/nimburion/nimburion
      extra-rules: true

    goimports:
      local-prefixes:
        - github.com/nimburion/nimburion

  exclusions:
    generated: strict
    warn-unused: true
    paths:
      - vendor
      - testdata
      - ".*\\.pb\\.go$"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true

run:
  timeout: 10m
  relative-path-mode: gomod
  modules-download-mode: readonly
  tests: true

