name: Run Verification

on:
  workflow_call:
    inputs:
      go-version:
        description: Go version to use
        required: false
        type: string
        default: "1.25.8"
      coverage-threshold:
        description: Minimum coverage percentage required
        required: false
        type: number
        default: 50
    outputs:
      coverage:
        description: Total coverage percentage
        value: ${{ jobs.coverage.outputs.coverage }}

jobs:
  vet:
    name: Vet
    runs-on: ubuntu-latest
    env:
      GOCACHE: /tmp/go-build-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Run go vet
        run: go vet ./...

  targeted:
    name: Test - ${{ matrix.lane.name }}
    needs: vet
    runs-on: ubuntu-latest
    env:
      GOCACHE: /tmp/go-build-cache
      REDIS_URL: redis://localhost:6379/0
      POSTGRES_URL: postgres://test:test@localhost:5432/testdb?sslmode=disable
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        lane:
          - name: config-cli
            command: go test ./pkg/config ./pkg/cli
          - name: http
            command: go test ./pkg/http/session ./pkg/http/server ./pkg/http/httpsignature
          - name: runtime
            command: go test ./pkg/jobs ./pkg/scheduler ./pkg/http/openapi
          - name: reliability-email
            command: go test ./pkg/reliability/idempotency ./internal/emailkit
          - name: persistence
            command: go test ./pkg/persistence/relational ./pkg/persistence/relational/mysql ./pkg/persistence/relational/migrate ./pkg/persistence/keyvalue/dynamodb
          - name: state
            command: go test ./pkg/cache ./pkg/session
          - name: cache-redis
            command: go test ./pkg/cache/redis -run 'TestAdapter_MapGetError_NotFoundMapsToCacheMiss|TestAdapter_WithOperationTimeout|TestAdapter_Integration'
          - name: session-redis
            command: go test ./pkg/session/redis -run 'TestAdapter_MapGetError_NotFoundMapsToSessionErrNotFound|TestAdapter_WithOperationTimeout|TestAdapter_Integration'
          - name: postgres-integration
            command: go test ./pkg/persistence/relational/postgres -run TestAdapter_Integration

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Run targeted verification lane
        shell: bash
        run: |
          set -euo pipefail
          ${{ matrix.lane.command }}

  full-sweep:
    name: Test - Full Sweep
    needs: targeted
    runs-on: ubuntu-latest
    env:
      GOCACHE: /tmp/go-build-cache
      REDIS_URL: redis://localhost:6379/0
      POSTGRES_URL: postgres://test:test@localhost:5432/testdb?sslmode=disable
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Run full repository sweep
        run: go test ./...

  coverage:
    name: Coverage Check
    needs: full-sweep
    runs-on: ubuntu-latest
    env:
      GOCACHE: /tmp/go-build-cache
      REDIS_URL: redis://localhost:6379/0
      POSTGRES_URL: postgres://test:test@localhost:5432/testdb?sslmode=disable
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    outputs:
      coverage: ${{ steps.check.outputs.coverage }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Collect coverage
        run: go test ./... -covermode=atomic -coverprofile=coverage.out

      - name: Check coverage threshold
        id: check
        shell: bash
        run: |
          set -euo pipefail

          go tool cover -func=coverage.out | tee coverage.txt

          threshold=${{ inputs.coverage-threshold }}
          coverage=$(awk '/^total:/ {print $3}' coverage.txt | sed 's/%//')
          echo "coverage=${coverage}" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${coverage}% (threshold: ${threshold}%)"

          if (( $(echo "$coverage < $threshold" | bc -l) )); then
            echo "::error::Coverage ${coverage}% is below threshold ${threshold}%"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.txt
          if-no-files-found: error
